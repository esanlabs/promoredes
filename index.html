<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaña Corporativa #SoyDPA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        
        #video-container {
            position: relative; 
            width: 100%; 
            max-width: 500px; 
            aspect-ratio: 1 / 1;
            overflow: hidden; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            background-color: #000;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            transform: scaleX(-1); 
        }

        #frame-overlay {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            pointer-events: none; 
            z-index: 10; 
            display: none;
            object-fit: contain;
        }

        .share-card {
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Pantalla de Carga -->
    <div id="loader" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-slate-600 font-medium">Sincronizando campaña...</p>
    </div>

    <!-- Header -->
    <header id="app-header" class="text-center mb-6">
        <h1 id="promo-title" class="text-2xl font-extrabold text-slate-800 tracking-tight px-4 capitalize">Cargando Campaña...</h1>
        <p id="promo-hashtag" class="text-indigo-600 font-bold">#...</p>
    </header>

    <main class="w-full flex flex-col items-center gap-6">
        <div id="video-container">
            <video id="video" autoplay playsinline></video>
            <img id="frame-overlay" src="" alt="Marco" crossorigin="anonymous">
        </div>

        <div id="controls" class="flex flex-col items-center gap-4 w-full max-w-xs">
            <button id="capture-btn" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-lg shadow-xl hover:bg-black transition-all active:scale-95">
                Tomar Foto
            </button>
            <p class="text-[10px] text-slate-400 text-center uppercase tracking-widest">Formato optimizado para Feed</p>
        </div>

        <div id="share-section" class="hidden share-card flex flex-col items-center gap-6 w-full max-w-sm bg-white p-6 rounded-[2.5rem] shadow-2xl border border-slate-100">
            <div class="text-center">
                <h2 class="text-xl font-bold text-slate-800">¡Te ves genial!</h2>
                <p id="promo-copy" class="text-sm text-slate-500 mt-1 italic"></p>
            </div>
            
            <img id="photo-preview" class="w-full rounded-2xl shadow-md border border-slate-50" src="" alt="Resultado">
            
            <div class="grid grid-cols-3 gap-4 w-full">
                <button onclick="handleShare('facebook')" class="flex flex-col items-center gap-2 group">
                    <div class="w-12 h-12 bg-[#1877F2] text-white rounded-full flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform font-bold">FB</div>
                    <span class="text-[10px] font-bold text-slate-400">FACEBOOK</span>
                </button>
                <button onclick="handleShare('linkedin')" class="flex flex-col items-center gap-2 group">
                    <div class="w-12 h-12 bg-[#0A66C2] text-white rounded-full flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform font-bold">IN</div>
                    <span class="text-[10px] font-bold text-slate-400">LINKEDIN</span>
                </button>
                <button onclick="handleShare('instagram')" class="flex flex-col items-center gap-2 group">
                    <div class="w-12 h-12 bg-gradient-to-tr from-[#f9ce34] via-[#ee2a7b] to-[#6228d7] text-white rounded-full flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform font-bold">IG</div>
                    <span class="text-[10px] font-bold text-slate-400">INSTAGRAM</span>
                </button>
            </div>

            <button onclick="copyContent()" class="w-full py-4 bg-indigo-50 text-indigo-700 rounded-xl font-bold text-sm border-2 border-indigo-100 hover:bg-indigo-100 transition-colors">
                Copiar Texto de Campaña
            </button>

            <button onclick="location.reload()" class="text-slate-400 text-xs font-medium underline py-2">Intentar otra toma</button>
        </div>
    </main>

    <canvas id="result-canvas" width="1080" height="1080" class="hidden"></canvas>

    <script>
        const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzHIYnUrNt5y76iIzNVAJKe8MMfo2jFUdolE7FBSRl4UfuI3WbzNHPM7v2TIfvTxkUNRA/exec"; 

        let campaignData = {
            promo: "Campaña Corporativa",
            copy: "¡Uniendo esfuerzos!",
            hashtag: "#SoyDPA",
            urlmarco: ""
        };

        const video = document.getElementById('video');
        const canvas = document.getElementById('result-canvas');
        const frameImg = document.getElementById('frame-overlay');
        const loader = document.getElementById('loader');

        async function fetchCampaign() {
            try {
                const response = await fetch(APP_SCRIPT_URL);
                if (!response.ok) throw new Error("Error en la respuesta de la red.");
                
                const data = await response.json();
                
                // Si el script devuelve un error estructurado, lo manejamos aquí
                if (data.error) {
                    console.warn("Aviso del Script:", data.error);
                    // No lanzamos error para permitir que usemos los datos por defecto si la hoja está vacía temporalmente
                } else {
                    campaignData = {
                        promo: data.promo || campaignData.promo,
                        copy: data.copy || campaignData.copy,
                        hashtag: data.hashtag || campaignData.hashtag,
                        urlmarco: data.urlmarco || campaignData.urlmarco
                    };
                }
                updateUI();
            } catch (err) {
                console.error("Error cargando datos:", err);
                // Si falla la conexión, mostramos los datos por defecto para que la app no se bloquee
                updateUI();
            } finally {
                loader.classList.add('hidden');
                initCamera();
            }
        }

        function updateUI() {
            document.getElementById('promo-title').textContent = campaignData.promo;
            document.getElementById('promo-hashtag').textContent = campaignData.hashtag;
            document.getElementById('promo-copy').textContent = campaignData.copy;
            if(campaignData.urlmarco) {
                frameImg.src = campaignData.urlmarco;
                frameImg.onload = () => frameImg.style.display = 'block';
                frameImg.onerror = () => console.error("No se pudo cargar la imagen del marco desde:", campaignData.urlmarco);
            }
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Activa la cámara para participar.");
            }
        }

        document.getElementById('capture-btn').addEventListener('click', () => {
            const ctx = canvas.getContext('2d');
            
            const videoAspect = video.videoWidth / video.videoHeight;
            const canvasAspect = canvas.width / canvas.height;
            let drawWidth, drawHeight, offsetX, offsetY;

            if (videoAspect > canvasAspect) {
                drawHeight = canvas.height;
                drawWidth = canvas.height * videoAspect;
                offsetX = (canvas.width - drawWidth) / 2;
                offsetY = 0;
            } else {
                drawWidth = canvas.width;
                drawHeight = canvas.width / videoAspect;
                offsetX = 0;
                offsetY = (canvas.height - drawHeight) / 2;
            }

            ctx.save();
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, offsetX, offsetY, drawWidth, drawHeight);
            ctx.restore();
            
            if (frameImg.src && frameImg.complete && frameImg.naturalWidth !== 0) {
                ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
            }

            document.getElementById('photo-preview').src = canvas.toDataURL('image/png');
            document.getElementById('video-container').classList.add('hidden');
            document.getElementById('controls').classList.add('hidden');
            document.getElementById('app-header').classList.add('hidden');
            document.getElementById('share-section').classList.remove('hidden');
        });

        function copyContent() {
            const fullText = `${campaignData.copy} ${campaignData.hashtag}`;
            navigator.clipboard.writeText(fullText).then(() => alert("¡Texto copiado!"));
        }

        function handleShare(platform) {
            const link = document.createElement('a');
            link.download = `Foto_SoyDPA.png`;
            link.href = document.getElementById('photo-preview').src;
            link.click();

            setTimeout(() => {
                const shareUrl = window.location.href;
                if(platform === 'facebook') window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}`, '_blank');
                if(platform === 'linkedin') window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(shareUrl)}`, '_blank');
                if(platform === 'instagram') alert("Imagen descargada. Súbela a Instagram y pega el texto.");
            }, 800);
        }

        fetchCampaign();
    </script>
</body>
</html>
