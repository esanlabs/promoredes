<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Foto #SoyDPA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        /* Contenedor del Editor 1:1 */
        #editor-viewport {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            background-color: #e2e8f0;
            cursor: move;
            touch-action: none;
        }

        /* La foto que sube el usuario */
        #user-photo {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: center center;
            pointer-events: none;
        }

        /* El marco PNG transparente */
        #frame-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            object-fit: contain;
        }

        .control-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: #cbd5e1;
            border-radius: 5px;
            outline: none;
        }

        .control-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #4f46e5;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Pantalla de Carga Inicial -->
    <div id="loader" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-slate-600 font-medium">Sincronizando con Google Sheets...</p>
    </div>

    <!-- Header -->
    <header class="text-center mb-6">
        <h1 id="promo-title" class="text-2xl font-extrabold text-slate-800 tracking-tight">Editor de Foto #SoyDPA</h1>
        <p id="promo-hashtag" class="text-indigo-600 font-bold tracking-wide italic">#SoyDPA</p>
    </header>

    <main class="w-full max-w-lg flex flex-col items-center gap-6">
        
        <!-- Vista previa del Editor -->
        <div id="editor-viewport">
            <img id="user-photo" src="" alt="" style="display:none;">
            <!-- Usamos el enlace directo de Imgur -->
            <img id="frame-overlay" src="https://i.imgur.com/DbhajNv.png" alt="Marco" crossorigin="anonymous">
            
            <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 p-8 text-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <p class="font-medium">Sube tu foto para aplicar el marco corporativo</p>
            </div>
        </div>

        <!-- Botones de Acción -->
        <div class="w-full flex flex-col gap-4">
            <input type="file" id="file-input" accept="image/*" class="hidden">
            <button onclick="document.getElementById('file-input').click()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-indigo-700 transition-all active:scale-95">
                Cargar mi Foto
            </button>
        </div>

        <!-- Controles de Edición -->
        <div id="edit-controls" class="hidden w-full bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col gap-5">
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Ajuste de tamaño (Zoom)</label>
                    <span id="zoom-val" class="text-xs font-bold text-indigo-600">100%</span>
                </div>
                <input type="range" id="zoom-slider" class="control-slider" min="0.1" max="4" step="0.01" value="1">
            </div>
            
            <div class="bg-indigo-50 p-3 rounded-xl">
                <p class="text-[11px] text-indigo-700 text-center font-medium leading-tight">
                    💡 <b>Tip:</b> Arrastra la foto dentro del cuadro para centrar tu rostro.
                </p>
            </div>
            
            <button id="download-btn" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-lg hover:bg-black transition-all shadow-xl">
                Descargar Imagen Final
            </button>
        </div>

        <div id="share-info" class="hidden w-full text-center">
             <button onclick="copyContent()" class="text-slate-500 hover:text-indigo-600 text-sm font-semibold flex items-center justify-center gap-2 mx-auto">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                </svg>
                Copiar texto para mi publicación
             </button>
        </div>
    </main>

    <canvas id="render-canvas" width="1080" height="1080" class="hidden"></canvas>

    <script>
        const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzHIYnUrNt5y76iIzNVAJKe8MMfo2jFUdolE7FBSRl4UfuI3WbzNHPM7v2TIfvTxkUNRA/exec";
        
        const fileInput = document.getElementById('file-input');
        const userPhoto = document.getElementById('user-photo');
        const frameOverlay = document.getElementById('frame-overlay');
        const zoomSlider = document.getElementById('zoom-slider');
        const editorViewport = document.getElementById('editor-viewport');
        const emptyState = document.getElementById('empty-state');
        const editControls = document.getElementById('edit-controls');
        const loader = document.getElementById('loader');

        let campaignData = { copy: "", hashtag: "" };
        
        let state = {
            scale: 1,
            x: 0,
            y: 0,
            isDragging: false,
            startX: 0,
            startY: 0
        };

        // 1. Obtener datos sincronizados y configurar marco
        async function init() {
            try {
                const response = await fetch(`${APP_SCRIPT_URL}?t=${Date.now()}`);
                const data = await response.json();
                
                if (!data.error) {
                    document.getElementById('promo-title').textContent = data.promo || "Campaña Corporativa";
                    document.getElementById('promo-hashtag').textContent = data.hashtag || "#SoyDPA";
                    campaignData.copy = data.copy || "";
                    campaignData.hashtag = data.hashtag || "";
                    
                    // Solo actualizamos el src si el script devuelve algo diferente al valor por defecto
                    // He puesto la URL directa de Imgur como valor base en el HTML
                    if (data.urlmarco && data.urlmarco.trim() !== "") {
                        let finalUrl = data.urlmarco;
                        // Corrección de URL de Imgur si es necesario
                        if (finalUrl.includes('imgur.com') && !finalUrl.includes('i.imgur.com')) {
                            const id = finalUrl.split('/').pop();
                            finalUrl = `https://i.imgur.com/${id}.png`;
                        }
                        frameOverlay.src = finalUrl;
                    }
                }
            } catch (e) {
                console.error("Error al conectar con Apps Script:", e);
            } finally {
                loader.classList.add('hidden');
            }
        }

        // 2. Manejo de archivo
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                userPhoto.src = event.target.result;
                userPhoto.style.display = 'block';
                emptyState.style.display = 'none';
                editControls.classList.remove('hidden');
                document.getElementById('share-info').classList.remove('hidden');
                
                userPhoto.onload = () => {
                    const ratioWidth = editorViewport.offsetWidth / userPhoto.naturalWidth;
                    const ratioHeight = editorViewport.offsetHeight / userPhoto.naturalHeight;
                    state.scale = Math.max(ratioWidth, ratioHeight);
                    state.x = (editorViewport.offsetWidth - userPhoto.naturalWidth * state.scale) / 2;
                    state.y = (editorViewport.offsetHeight - userPhoto.naturalHeight * state.scale) / 2;
                    zoomSlider.value = state.scale;
                    document.getElementById('zoom-val').textContent = Math.round(state.scale * 100) + "%";
                    updateTransform();
                };
            };
            reader.readAsDataURL(file);
        });

        // 3. Controles
        zoomSlider.addEventListener('input', (e) => {
            state.scale = parseFloat(e.target.value);
            document.getElementById('zoom-val').textContent = Math.round(state.scale * 100) + "%";
            updateTransform();
        });

        function updateTransform() {
            userPhoto.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale})`;
        }

        const startDrag = (e) => {
            if (!userPhoto.src) return;
            state.isDragging = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            state.startX = clientX - state.x;
            state.startY = clientY - state.y;
            editorViewport.style.cursor = 'grabbing';
        };

        const onDrag = (e) => {
            if (!state.isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            state.x = clientX - state.startX;
            state.y = clientY - state.startY;
            updateTransform();
        };

        const stopDrag = () => {
            state.isDragging = false;
            editorViewport.style.cursor = 'move';
        };

        editorViewport.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', onDrag);
        window.addEventListener('mouseup', stopDrag);
        
        editorViewport.addEventListener('touchstart', startDrag);
        window.addEventListener('touchmove', onDrag);
        window.addEventListener('touchend', stopDrag);

        // 4. Descarga final a 1080x1080
        document.getElementById('download-btn').addEventListener('click', () => {
            const canvas = document.getElementById('render-canvas');
            const ctx = canvas.getContext('2d');
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const s2c = 1080 / editorViewport.offsetWidth;

            ctx.save();
            const fX = state.x * s2c;
            const fY = state.y * s2c;
            const fS = state.scale * s2c;
            
            ctx.translate(fX, fY);
            ctx.scale(fS, fS);
            ctx.drawImage(userPhoto, 0, 0);
            ctx.restore();

            if (frameOverlay.src) {
                const imgMarco = new Image();
                imgMarco.crossOrigin = "anonymous";
                imgMarco.src = frameOverlay.src;
                imgMarco.onload = () => {
                    ctx.drawImage(imgMarco, 0, 0, 1080, 1080);
                    const link = document.createElement('a');
                    link.download = 'Campana_SoyDPA.png';
                    link.href = canvas.toDataURL('image/png', 1.0);
                    link.click();
                };
                imgMarco.onerror = () => {
                    alert("Error al procesar el marco corporativo. Prueba usando el enlace directo de la imagen.");
                };
            }
        });

        function copyContent() {
            const text = `${campaignData.copy} ${campaignData.hashtag}`;
            navigator.clipboard.writeText(text).then(() => alert("¡Texto copiado al portapapeles!"));
        }

        init();
    </script>
</body>
</html>
