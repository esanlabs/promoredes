<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Editor de Foto #SoyDPA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: 'Segoe UI', system-ui, sans-serif; overflow-x: hidden; }
        
        #editor-viewport {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
            background-color: #ffffff;
            cursor: move;
            touch-action: none; /* Crucial para evitar scroll mientras se arrastra */
        }

        #user-photo {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0; /* Cambio a 0,0 para facilitar el cálculo de posición */
            pointer-events: none;
            will-change: transform;
        }

        #frame-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            object-fit: contain;
        }

        .control-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 12px;
            outline: none;
        }

        .control-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 28px;
            background: #4f46e5;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <header class="text-center mb-6">
        <h1 class="text-3xl font-black text-slate-900 tracking-tight">#YoSoyESANDPA</h1>
        <p class="text-slate-500 font-medium">Ajusta tu foto dentro del marco oficial</p>
    </header>

    <main class="w-full max-w-md flex flex-col items-center gap-6">
        
        <div id="editor-viewport">
            <img id="user-photo" src="" alt="" style="display:none;">
            <img id="frame-overlay" src="https://i.imgur.com/DbhajNv.png" alt="Marco" crossorigin="anonymous">
            
            <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 p-8 text-center">
                <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>
                <p class="font-bold text-slate-600">Sube tu foto de perfil</p>
            </div>
        </div>

        <div class="w-full flex flex-col gap-4">
            <input type="file" id="file-input" accept="image/*" class="hidden">
            <button onclick="document.getElementById('file-input').click()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-200 active:scale-95 transition-transform flex items-center justify-center gap-2">
                Subir Foto
            </button>
        </div>

        <div id="edit-controls" class="hidden w-full bg-white p-6 rounded-3xl shadow-xl border border-slate-100 flex flex-col gap-6">
            <div>
                <div class="flex justify-between items-center mb-3">
                    <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Tamaño de Imagen</label>
                    <span id="zoom-val" class="text-sm font-bold text-indigo-600">100%</span>
                </div>
                <input type="range" id="zoom-slider" class="control-slider" min="0.1" max="10" step="0.01" value="1">
            </div>
            
            <button id="download-btn" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black text-lg shadow-xl active:scale-95 transition-transform">
                Descargar Imagen Final
            </button>
        </div>
    </main>

    <canvas id="render-canvas" width="1080" height="1080" class="hidden"></canvas>

    <script>
        const fileInput = document.getElementById('file-input');
        const userPhoto = document.getElementById('user-photo');
        const zoomSlider = document.getElementById('zoom-slider');
        const editorViewport = document.getElementById('editor-viewport');
        const emptyState = document.getElementById('empty-state');
        const editControls = document.getElementById('edit-controls');
        const renderCanvas = document.getElementById('render-canvas');
        
        const FRAME_URL = "https://i.imgur.com/DbhajNv.png";
        
        let state = {
            scale: 1,
            baseScale: 1,
            x: 0,
            y: 0,
            isDragging: false,
            startX: 0,
            startY: 0
        };

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                userPhoto.src = event.target.result;
                userPhoto.style.display = 'block';
                emptyState.style.display = 'none';
                editControls.classList.remove('hidden');
                
                userPhoto.onload = () => {
                    const viewW = editorViewport.offsetWidth;
                    const viewH = editorViewport.offsetHeight;
                    
                    // Calculamos la escala mínima para llenar el recuadro
                    const scaleX = viewW / userPhoto.naturalWidth;
                    const scaleY = viewH / userPhoto.naturalHeight;
                    state.baseScale = Math.max(scaleX, scaleY);
                    
                    // Aplicamos la escala base y centramos
                    state.scale = state.baseScale;
                    state.x = (viewW - userPhoto.naturalWidth * state.scale) / 2;
                    state.y = (viewH - userPhoto.naturalHeight * state.scale) / 2;
                    
                    // Configuramos el slider: mínimo 50% del tamaño base, máximo 1000%
                    zoomSlider.min = state.baseScale * 0.5;
                    zoomSlider.max = state.baseScale * 10;
                    zoomSlider.value = state.scale;
                    
                    updateUI();
                };
            };
            reader.readAsDataURL(file);
        });

        zoomSlider.addEventListener('input', (e) => {
            const oldScale = state.scale;
            state.scale = parseFloat(e.target.value);
            
            // Ajustar X e Y para que el zoom parezca hacerse al centro
            const viewW = editorViewport.offsetWidth;
            const viewH = editorViewport.offsetHeight;
            state.x -= (userPhoto.naturalWidth * (state.scale - oldScale)) / 2;
            state.y -= (userPhoto.naturalHeight * (state.scale - oldScale)) / 2;
            
            updateUI();
        });

        function updateUI() {
            userPhoto.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale})`;
            const zoomPercent = Math.round((state.scale / state.baseScale) * 100);
            document.getElementById('zoom-val').textContent = zoomPercent + "%";
        }

        // Eventos de arrastre
        const moveStart = (e) => {
            if (!userPhoto.src) return;
            state.isDragging = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            state.startX = clientX - state.x;
            state.startY = clientY - state.y;
        };

        const moveUpdate = (e) => {
            if (!state.isDragging) return;
            if (e.touches) e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            state.x = clientX - state.startX;
            state.y = clientY - state.startY;
            updateUI();
        };

        const moveEnd = () => state.isDragging = false;

        editorViewport.addEventListener('mousedown', moveStart);
        window.addEventListener('mousemove', moveUpdate);
        window.addEventListener('mouseup', moveEnd);
        editorViewport.addEventListener('touchstart', moveStart, {passive: false});
        window.addEventListener('touchmove', moveUpdate, {passive: false});
        window.addEventListener('touchend', moveEnd);

        // Descarga
        document.getElementById('download-btn').addEventListener('click', async () => {
            const ctx = renderCanvas.getContext('2d');
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, 1080, 1080);
            
            const factor = 1080 / editorViewport.offsetWidth;

            // Dibujar Foto
            ctx.save();
            ctx.translate(state.x * factor, state.y * factor);
            ctx.scale(state.scale * factor, state.scale * factor);
            ctx.drawImage(userPhoto, 0, 0);
            ctx.restore();

            // Dibujar Marco
            const imgMarco = new Image();
            imgMarco.crossOrigin = "anonymous";
            imgMarco.src = FRAME_URL + "?t=" + Date.now();
            imgMarco.onload = () => {
                ctx.drawImage(imgMarco, 0, 0, 1080, 1080);
                const link = document.createElement('a');
                link.download = "YoSoyESANDPA.png";
                link.href = renderCanvas.toDataURL('image/png', 1.0);
                link.click();
            };
        });

        function copyContent() {
            navigator.clipboard.writeText("#YoSoyESANDPA").then(() => alert("Hashtag copiado"));
        }
    </script>
</body>
</html>
